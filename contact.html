<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お問い合わせ | Moriris</title>
  <link rel="icon" href="/assets/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #2a2a25;
      --ink-soft: #6b6659;
      --moss: #4a6741;
      --cream: #faf7f0;
      --sand: #e8e0cc;
      --warm: #c8a96e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif JP', 'Georgia', serif;
      line-height: 1.8;
      font-weight: 300;
    }

    /* TOP BAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 14px 24px;
      background: rgba(245,240,232,0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(232,224,204,0.5);
    }
    .lang-toggle {
      display: flex; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
      border-radius: 999px; padding: 4px; gap: 2px; border: 1px solid rgba(200,169,110,0.3);
    }
    .lang-btn {
      border: none; background: none; padding: 4px 14px; border-radius: 999px;
      font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 600;
      letter-spacing: 0.08em; color: var(--ink-soft); cursor: pointer; transition: all 0.25s;
    }
    .lang-btn[aria-pressed="true"] { background: var(--moss); color: #fff; }

    /* PAGE */
    .page-wrap { max-width: 720px; margin: 0 auto; padding: 100px 24px 60px; }
    .section-label {
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm);
      margin-bottom: 20px; display: block;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 300;
      color: var(--ink); line-height: 1.2; margin-bottom: 16px;
    }
    .page-lead { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.9; margin-bottom: 32px; }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--warm), transparent);
      margin: 0 0 32px;
    }

    /* FORM CARD */
    .form-card {
      background: var(--cream); border-radius: 20px;
      border: 1px solid rgba(200,169,110,0.2);
      overflow: hidden;
    }
    .form-frame {
      width: 100%;
      height: 860px;
      border: none;
      display: block;
      background: #fff;
    }
    .form-fallback {
      padding: 20px 24px;
      font-size: 0.82rem;
      color: var(--ink-soft);
      border-top: 1px solid var(--sand);
    }
    .form-fallback a { color: var(--moss); text-decoration: none; border-bottom: 1px solid rgba(74,103,65,0.3); }
    .form-fallback a:hover { border-color: var(--moss); }

    footer { padding: 40px 24px; text-align: center; border-top: 1px solid var(--sand); }
    footer a { font-size: 0.78rem; color: var(--ink-soft); text-decoration: none; }
    footer a:hover { color: var(--moss); }
    .footer-copy { font-size: 0.72rem; color: #a09a8e; margin-top: 8px; }
  </style>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HWRX6Q9K3E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('consent', 'default', { ad_storage: 'denied', ad_user_data: 'denied', ad_personalization: 'denied', analytics_storage: 'granted' });
    gtag('config', 'G-HWRX6Q9K3E');
  </script>
</head>
<body>

  <div class="topbar">
    
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="ja" aria-pressed="true">JP</button>
      <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
    </div>
  </div>

  <div class="page-wrap">
    <span class="section-label">Contact</span>
    <h1 class="page-title" id="page-title">お問い合わせ</h1>
    <div class="divider"></div>
    <p class="page-lead" id="page-lead">下記フォームよりお問い合わせください。内容を確認のうえ、順次ご返信いたします。</p>

    <div class="form-card">
      <iframe class="form-frame"
        src="https://docs.google.com/forms/d/e/1FAIpQLSdiRtiqdAxuMA3vXgNvelh8L4KRdkcc-X_jBlwhbNlf0wiDYg/viewform?usp=header"
        title="Contact form">
      </iframe>
      <div class="form-fallback">
        <span id="fallback-text">フォームが表示されない場合は</span>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdiRtiqdAxuMA3vXgNvelh8L4KRdkcc-X_jBlwhbNlf0wiDYg/viewform?usp=header" target="_blank" rel="noopener" id="fallback-link">こちらをクリックして新しいタブで開いてください</a>。
      </div>
    </div>
  </div>

  <footer>
    <a href="/" id="footer-home">トップページへ戻る</a>
    <p class="footer-copy">© Moriris Studio</p>
  </footer>

  <script>
    const texts = {
      ja: {
        back: "← トップページへ", title: "お問い合わせ",
        lead: "下記フォームよりお問い合わせください。内容を確認のうえ、順次ご返信いたします。",
        fallback: "フォームが表示されない場合は", fallback_link: "こちらをクリックして新しいタブで開いてください",
        footer: "トップページへ戻る",
      },
      en: {
        back: "← Back to home", title: "Contact",
        lead: "Please submit your inquiry using the form below. We will review your message and reply as soon as possible.",
        fallback: "If the form does not display, ", fallback_link: "click here to open in a new tab",
        footer: "Back to home",
      }
    };
    let currentLang = localStorage.getItem("moriris_lang") || "ja";
    function applyLang(lang) {
      currentLang = lang;
      const t = texts[lang] || texts.ja;
      document.documentElement.lang = lang;
      document.getElementById("page-title").textContent = t.title;
      document.getElementById("page-lead").textContent = t.lead;
      document.getElementById("fallback-text").textContent = t.fallback;
      document.getElementById("fallback-link").textContent = t.fallback_link;
      document.getElementById("footer-home").textContent = t.footer;
      document.querySelectorAll(".lang-btn").forEach(b => b.setAttribute("aria-pressed", b.dataset.lang === lang ? "true" : "false"));
      localStorage.setItem("moriris_lang", lang);
    }
    document.querySelectorAll(".lang-btn").forEach(btn => btn.addEventListener("click", () => applyLang(btn.dataset.lang)));
    applyLang(currentLang);
  </script>
</body>
</html>
